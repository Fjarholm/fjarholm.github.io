<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fjarholm | Gallery</title>

    <meta name="description" content="Gallery of architectural concepts, vector illustrations and pastel artworks by Fjarholm.">

    <link rel="canonical" href="https://fjarholm.com/gallery.html">

    <!-- Open Graph -->
	<!-- See rida keelab Google'il otsingutulemustes pilti näidata -->
    <meta name="robots" content="max-image-preview:none">
	
    <meta property="og:title" content="Fjarholm | Gallery">
    <meta property="og:description" content="Gallery of architectural concepts, vector illustrations and pastel artworks by Fjarholm.">
    <meta property="og:url" content="https://fjarholm.com/gallery.html">
    <meta property="og:type" content="website">

    <!-- 1. Uus ja üliterav SVG põhi-faviconiks (suunatud assets/svg/ kausta) -->
    <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">

    <!-- 2. Sinu 512x512 PNG tagavara (suunatud assets/img/favicon/ kausta) -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/img/favicon/favicon.png">

    <!-- 3. Sinu stiilileht (suunatud uude assets/css/ kausta) -->
    <link rel="stylesheet" href="assets/css/style.css">
    
</head>
<body>

    <!-- Navigation -->
    <nav class="nav-center">
        <!-- Logo suunatud assets/svg/ kausta -->
        <img src="assets/img/logo/fjarholm-logo.svg" class="logo-img" alt="Fjarholm logo" width="260" height="80" fetchpriority="high">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="info.html">Info</a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main>

        <!-- Gallery -->
        <section class="gallery-container">

            <h1 class="gallery-title">Gallery</h1>

            <!-- Architecture -->
            <h2 class="gallery-section-title">Architecture</h2>
            <div class="gallery-grid">
                <img src="assets/img/architecture/fjarholm-atelier-architecture-1.jpg"
                     alt="Minimalist geometric brutalist house sketch with purple landscape accents by Fjarholm">

                <img src="assets/img/architecture/fjarholm-atelier-architecture-2.jpg"
                     alt="Modern multi-story white residential villa design sketch with green balconies">

                <img src="assets/img/architecture/fjarholm-atelier-architecture-3.jpg"
                     alt="Contemporary minimalist white villa architectural concept with a swimming pool">

                <img src="assets/img/architecture/fjarholm-atelier-architecture-4.jpg"
                     alt="Architectural watercolor and ink sketch of a modern bridge with tall columns and autumn trees">
            </div>

                    <!-- Vector Art -->
                    <h2 class="gallery-section-title">Vector Outline Silhouette</h2>
                    <div class="gallery-grid vector">
                <picture>
                    <source media="(max-width: 600px)"
                            srcset="assets/img/vectorart/fjarholm-atelier-vectorart-1-mobile.jpg">
                    <img src="assets/img/vectorart/fjarholm-atelier-vectorart-1.jpg"
                         alt="Minimalist vector line art of a speed skater on an ice rink with mountain background">
                </picture>

                <picture>
                    <source media="(max-width: 600px)"
                            srcset="assets/img/vectorart/fjarholm-atelier-vectorart-2-mobile.jpg">
                    <img src="assets/img/vectorart/fjarholm-atelier-vectorart-2.jpg"
                         alt="Clean vector illustration of a speed skater turning on ice under a soft blue sky">
                </picture>

            </div>

            <!-- Pastel Art -->
            <h2 class="gallery-section-title">Pastel Art</h2>
            <div class="gallery-grid">

                <img src="assets/img/pastelart/fjarholm-atelier-pastelart-1.jpg"
                     alt="Abstract pastel art with boho geometric shapes and terracotta arches">

                <img src="assets/img/pastelart/fjarholm-atelier-pastelart-2.jpg"
                     alt="Earthy tones abstract pastel artwork with overlapping smooth organic shapes">

                <img src="assets/img/pastelart/fjarholm-atelier-pastelart-3.jpg"
                     alt="Minimalist botanical pastel art featuring a green leafy branch over terracotta arches">

                <img src="assets/img/pastelart/fjarholm-atelier-pastelart-4.jpg"
                     alt="Abstract geometric pastel composition with circles and semi-circles in earth tones">
            </div>

			<div style="text-align:center; margin-top:40px;">
				<a href="https://fjarholm.com/portfolio/" class="cta">
					Portfolio
				</a>
			</div>	

        </section>

    </main>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="https://www.instagram.com/fjarholm/" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://www.facebook.com/fjarholm" target="_blank" rel="noopener noreferrer">Facebook</a>
            <a href="https://www.pinterest.com/fjarholm" target="_blank" rel="noopener noreferrer">Pinterest</a>
            <a href="https://codepen.io/fjarholm-art" target="_blank" rel="noopener noreferrer">CodePen</a>
            <!-- Uuendatud GitHubi link uue organisatsiooni vastu -->
            <a href="https://github.com/fjarholm" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="mailto:info@fjarholm.com">info@fjarholm.com</a>
        </div>
        <p>© Fjarholm</p>
    </footer>

</body>
</html>
