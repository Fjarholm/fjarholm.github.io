<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fjarholm</title>

    <meta name="description" content="Official portfolio of Fjarholm. Exploring the essence of Nordic nature through contemporary art. Discover unique minimalist galleries and artistic expressions.">

    <link rel="canonical" href="https://fjarholm.com/">

    <!-- Open Graph -->
    <!-- See rida keelab Google'il otsingutulemustes pilti näidata -->
    <meta name="robots" content="max-image-preview:none">
    
    <meta property="og:title" content="Fjarholm">
    <meta property="og:description" content="Nordic-inspired digital art exploring nature, geometry, and minimalist design through digital craftsmanship.">
    <meta property="og:url" content="https://fjarholm.com/">
    <meta property="og:type" content="website">
    <!-- Pilt suunatud uude assets/img/og/ kausta -->
    <meta property="og:image" content="https://fjarholm.com/assets/img/og/fjarholm-og.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:alt" content="Fjarholm – Nordic-inspired digital art">

    <!-- Pinterest verification -->
    <meta name="p:domain_verify" content="29bfdf255786fa9532a7a527511c7ca4"/>

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "@id": "https://fjarholm.com/#organization",
      "name": "Fjarholm",
      "url": "https://fjarholm.com/",
      "logo": "https://fjarholm.com/assets/svg/fjarholm-logo.svg",
      "image": "https://fjarholm.com/assets/svg/fjarholm-logo.svg",
      "description": "Independent digital art portfolio inspired by Nordic nature and minimalist design, featuring architecture, vector art and pastel artworks.",
      "email": "info@fjarholm.com",
      "sameAs": [
        "https://www.instagram.com/fjarholm/",
        "https://www.facebook.com/fjarholm",
        "https://www.pinterest.com/fjarholm",
        "https://github.com/fjarholm",
        "https://sites.google.com/view/fjarholm-portfolio/"
      ]
    }
    </script>

    <!-- 1. Uus ja üliterav SVG põhi-faviconiks (suunatud assets/svg/ kausta) -->
    <link rel="icon" type="image/svg+xml" href="assets/svg/favicon.svg">

    <!-- 2. Sinu 512x512 PNG tagavara (suunatud assets/img/favicon/ kausta) -->
    <link rel="icon" type="image/png" sizes="512x512" href="assets/img/favicon/favicon.png">

    <!-- 3. Sinu stiilileht (suunatud uude assets/css/ kausta) -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="nav-center">
        <!-- Logo suunatud assets/svg/ kausta -->
        <img src="assets/img/logo/fjarholm-logo.svg" class="logo-img" alt="Fjarholm logo" width="260" height="80" fetchpriority="high">
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="gallery.html">Gallery</a>
            <a href="info.html">Info</a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
	<main>
		<!-- Hero Section -->
		<section class="hero" style="text-align: center; max-width: 600px; margin: 0 auto; padding: 20px 20px;">
			
			<!-- 1. Pealkiri -->
			<h1 style="font-size: 30px; letter-spacing: 3px; font-weight: 600; margin-top: 0px; margin-bottom: 15px; color: #ffffff;">
				Fjarholm
			</h1>
			
			<!-- 2. Tsitaat -->
			<h2 style="font-size: 17px; font-weight: 300; color: #dddddd; line-height: 1.6; letter-spacing: 0.5px; margin-top: 0px; margin-bottom: 25px; font-style: italic;">
				In nature, nothing is lost. Death becomes the seed of something new.
			</h2>
			
			<!-- 3. Pilt tsitaadi ja nupu VAHEL -->
			<div style="margin-bottom: 25px;">
			<img src="assets/img/hero/hero-autumn-illustration.svg" 
				 alt="Fjarholm Nature Vector" 
				 fetchpriority="high"
				 width="500"
				 height="500"
				 style="width: 100%; max-width: 200px; height: auto; display: inline-block;">
			</div>

			<!-- 4. Nupp -->
			<a href="gallery.html" class="cta">Gallery</a>

		</section>
	</main>

    <!-- Footer -->
    <footer>
        <div class="footer-links">
            <a href="https://www.instagram.com/fjarholm/" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://www.facebook.com/fjarholm" target="_blank" rel="noopener noreferrer">Facebook</a>
            <a href="https://www.pinterest.com/fjarholm" target="_blank" rel="noopener noreferrer">Pinterest</a>
            <a href="https://codepen.io/fjarholm-art" target="_blank" rel="noopener noreferrer">CodePen</a>
            <!-- Uuendatud GitHubi link uue organisatsiooni vastu -->
            <a href="https://github.com/fjarholm" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="mailto:info@fjarholm.com">info@fjarholm.com</a>
        </div>
        <p>© Fjarholm</p>
    </footer>

</body>
</html>
